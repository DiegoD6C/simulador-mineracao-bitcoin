<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-book Grátis: Receitas Veganas Rápidas</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 20px; }
        .container { max-width: 700px; margin: auto; }
        h1 { color: #28a745; }
        form { margin-top: 20px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"] { width: calc(100% - 12px); padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Receba seu E-book Grátis: Receitas Veganas Rápidas para o Dia a Dia!</h1>
        <p>Descubra pratos deliciosos e fáceis de preparar que vão transformar sua rotina na cozinha.</p>
        <form action="URL_DO_SEU_SERVIDOR_OU_FERRAMENTA_DE_AUTOMAÇÃO" method="post">
            <label for="nome">Seu Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">Seu Melhor E-mail:</label>
            <input type="email" id="email" name="email" required>

            <button type="submit">Baixar Meu E-book!</button>
        </form>
        <p>Ao clicar em baixar, você concorda em receber nossas novidades e promoções.</p>
    </div>
</body>
</html>
