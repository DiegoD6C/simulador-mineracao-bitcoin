<!DOCTYPE html>\n<html lang="pt-BR">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Gerador de E-books e Produtos Digitais</title>\n    <style>\n        body { margin: 0; font-family: Arial, sans-serif; }\n        header { background-color: #4CAF50; color: white; padding: 1rem; text-align: center; }\n        nav { margin: 1rem 0; }\n        nav a { margin: 0 15px; text-decoration: none; color: #f2f2f2; }\n        main { padding: 20px; }\n        footer { background-color: #4CAF50; color: white; text-align: center; padding: 1rem; position: absolute; width: 100%; bottom: 0; }\n        form { display: flex; flex-direction: column; max-width: 400px; margin: auto; }\n        form input, form select, form button { margin: 10px 0; padding: 10px; font-size: 1rem; }\n        .product-list { margin-top: 20px; }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>Gerador de E-books e Produtos Digitais</h1>\n    </header>\n    <nav>\n        <a href="#">Home</a>\n        <a href="#">Contact</a>\n        <a href="#">About</a>\n    </nav>\n    <main>\n        <form id="product-form">\n            <input type="text" id="product-title" placeholder="Título do Produto" required>\n            <textarea id="product-description" placeholder="Descrição do Produto" required></textarea>\n            <select id="product-category" required>\n                <option value="">Escolha a Categoria</option>\n                <option value="e-book">E-book</option>\n                <option value="curso">Curso</option>\n                <option value="software">Software</option>\n            </select>\n            <button type="submit">Gerar PDF</button>\n            <button type="button" id="preview-button">Pré-visualizar</button>\n        </form>\n        <div class="product-list">\n            <h2>Produtos Criados:</h2>\n            <ul id="product-list"></ul>\n        </div>\n    </main>\n    <footer>\n        <p>&copy; 2026 Gerador de E-books e Produtos Digitais</p>\n    </footer>\n</body>\n</html>
